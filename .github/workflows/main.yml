name: push
on:
  push:
    tags:
      - "v*"

jobs:
  delete-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Delete artifacts
        uses: c-hive/gha-remove-artifacts@v1
        with:
          age: '7 day'

  windows-build-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout commit
        uses: actions/checkout@master

      - name: Set up Python 3.12
        uses: actions/setup-python@master
        with: { python-version: 3.12 }

      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      
      - name: Install modules
        run: pip install -r installer_requirements.txt

      - name: Install cx_Freeze
        run: pip install cx_Freeze==7.0.0
    
      - name: Build
        run: python installer_setup.py build
      
      - name: Rename
        working-directory: build\
        run: mv exe.win-amd64-3.12 inf-notebook-installer

      - name: Zip
        run: Compress-Archive -Path build/inf-notebook-installer -DestinationPath ./inf-notebook-installer.zip

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: zipfile-installer
          path: inf-notebook-installer.zip
          retention-days: 1

  windows-build:
    runs-on: windows-latest
    steps:
      - name: Checkout commit
        uses: actions/checkout@master

      - name: Set up Python 3.12
        uses: actions/setup-python@master
        with: { python-version: 3.12 }

      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      
      - name: Install modules
        run: pip install -r requirements.txt
    
      - name: Install cx_Freeze
        run: pip install cx_Freeze==8.5.3
    
      - name: Build
        run: |
          python generate_service_account_info.py ${{ secrets.KEYINFO }}
          python generate_googleapi_clientconfig.py ${{ secrets.CLIENTCONFIG }}
          python generate_version.py ${{ github.ref_name }}
          python setup.py build
  
      - name: Rename
        working-directory: build\
        run: mv exe.win-amd64-3.12 inf-notebook
      
      - name: Delete no use file PIL
        working-directory: build\inf-notebook\lib\PIL\
        run: del _avif.cp312-win_amd64.pyd
      
      - name: Delete no use file googleapi
        working-directory: build\inf-notebook\lib\googleapiclient\discovery_cache\documents\
        run: Get-ChildItem -Recurse -File | Where-Object { $_.Name -ne "drive.v3.json" } | Remove-Item -Force

      - name: Zip
        run: Compress-Archive -Path build/inf-notebook -DestinationPath ./inf-notebook.zip

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: zipfile
          path: inf-notebook.zip
          retention-days: 1

      - name: Install pyinstaller
        run: pip install pyinstaller==6.21.0
    
      - name: Build Installer Standalone
        run: pyinstaller
          --onefile
          --add-data="version.txt:."
          --add-data="icon.ico:."
          --add-data="inf-notebook.zip:."
          --icon=icon.ico
          --name="inf-notebook-installer-standalone.exe"
          installer_standalone.pyw

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-standalone
          path: dist/inf-notebook-installer-standalone.exe
          retention-days: 1

      - name: Build Installer Standalone Debug
        run: pyinstaller
          --onefile
          --add-data="version.txt:."
          --add-data="icon.ico:."
          --add-data="inf-notebook.zip:."
          --icon=icon.ico
          --name="inf-notebook-installer-standalone-debug.exe"
          installer_standalone_debug.pyw

      - name: Upload Installer Debug
        uses: actions/upload-artifact@v4
        with:
          name: installer-standalone-debug
          path: dist/inf-notebook-installer-standalone-debug.exe
          retention-days: 1

  release:
    needs: [windows-build, windows-build-installer]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout commit
        uses: actions/checkout@master

      - name: Set Environpment Installer Version
        run: echo "installer_version=$(grep -E "(.*)version_installer(.*)=" installer.py | awk -F'=' '{print $2}' | sed 's/[ '\'']//g')" >> "$GITHUB_ENV"

      - name: Set Environpment Zip File Name
        run: |
          echo "filename_zip=inf-notebook-${{ github.ref_name }}.zip" >> "$GITHUB_ENV"
          echo "filename_installer_standalone=inf-notebook${{ github.ref_name }}-installer-standalone.exe" >> "$GITHUB_ENV"
          echo "filename_installer_standalone_debug=inf-notebook${{ github.ref_name }}-installer-standalone-debug.exe" >> "$GITHUB_ENV"
          echo "filename_installer_zip=inf-notebook-installer${{ env.installer_version }}.zip" >> "$GITHUB_ENV"

      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: zipfile

      - name: Download installer standalone
        uses: actions/download-artifact@v4
        with:
          name: installer-standalone

      - name: Download installer standalone debug
        uses: actions/download-artifact@v4
        with:
          name: installer-standalone-debug

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: zipfile-installer

      - name: Rename
        run: |
          ls -R ./
          mv inf-notebook.zip ${{ env.filename_zip }}
          mv inf-notebook-installer-standalone.exe ${{ env.filename_installer_standalone }}
          mv inf-notebook-installer-standalone-debug.exe ${{ env.filename_installer_standalone_debug }}
          mv inf-notebook-installer.zip ${{ env.filename_installer_zip }}
          ls -R ./

      - name: Edit Release Description
        run: |
          sed -i -e "s/&&filename_zip&&/${{ env.filename_zip }}/" RELEASE_DESCRIPTION
          sed -i -e "s/&&filename_installer_standalone&&/${{ env.filename_installer_standalone }}/" RELEASE_DESCRIPTION
          sed -i -e "s/&&filename_installer_zip&&/${{ env.filename_installer_zip }}/" RELEASE_DESCRIPTION

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body_path: RELEASE_DESCRIPTION
          draft: true
          prerelease: false

      - name: Append Binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ env.filename_zip }}
          asset_name: ${{ env.filename_zip }}
          asset_content_type: application/zip

      - name: Append Binary Installer Standalone
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ env.filename_installer_standalone }}
          asset_name: ${{ env.filename_installer_standalone }}
          asset_content_type: application/x-msdownload

      - name: Append Binary Installer Standalone Debug
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ env.filename_installer_standalone_debug }}
          asset_name: ${{ env.filename_installer_standalone_debug }}
          asset_content_type: application/x-msdownload

      - name: Append Binary Installer
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ env.filename_installer_zip }}
          asset_name: ${{ env.filename_installer_zip }}
          asset_content_type: application/zip
